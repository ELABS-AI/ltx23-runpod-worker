# CI: Build & Push ltx23-runpod-worker to GHCR
name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - requirements*.txt
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: latest)"
        type: string
        default: latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ltx23-runpod-worker

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/elabs-ai/${{ env.IMAGE_NAME }}:${{ inputs.image_tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
